<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECISION BRIDGE 메모</title>

  <!-- Tableau Extensions API -->
  <script src="https://cdn.jsdelivr.net/npm/tableau-extensions-api@1.14.1/vendor/tableau-extensions/tableau.extensions.1.latest.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: #f8f9fb;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      overflow: hidden;
    }
    .btn {
      padding: 5px 14px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-memo {
      background: #2563eb;
      color: #fff;
    }
    .btn-memo:hover { background: #1d4ed8; }
    .btn-memo:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .btn-list {
      background: #475569;
      color: #fff;
    }
    .btn-list:hover { background: #334155; }
    .btn-list:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }
    .btn-settings {
      background: #e2e8f0;
      color: #475569;
      font-size: 11px;
      padding: 5px 10px;
    }
    .btn-settings:hover { background: #cbd5e1; }
    .divider {
      width: 1px;
      height: 20px;
      background: #cbd5e1;
    }
    .selected-info {
      font-size: 11px;
      color: #475569;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .selected-info .num {
      font-weight: 700;
      color: #1e40af;
    }
    .memo-badge {
      display: inline-block;
      background: #fbbf24;
      color: #78350f;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 6px;
    }
    .client-badge {
      display: inline-block;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .status-msg {
      font-size: 11px;
      color: #94a3b8;
    }
    .warning-msg {
      font-size: 11px;
      color: #dc2626;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <button class="btn btn-memo" id="btnAddMemo" disabled>메모 추가</button>
  <button class="btn btn-list" id="btnMemoList" disabled>메모 목록</button>
  <button class="btn btn-settings" id="btnSettings">설정</button>
  <span class="divider"></span>
  <span class="selected-info" id="selectedInfo">
    <span class="status-msg">초기화 중...</span>
  </span>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
