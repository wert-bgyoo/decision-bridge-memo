<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메모 목록 관리</title>

  <!-- Tableau Extensions API -->
  <script src="https://cdn.jsdelivr.net/npm/tableau-extensions-api@1.14.1/lib/tableau.extensions.1.latest.min.js"></script>
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      padding: 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── 검색/필터 바 ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 7px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }
    .search-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.15);
    }
    .filter-select {
      padding: 7px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
    }

    /* ── 통계 바 ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .stat-item {
      font-size: 12px;
      color: #64748b;
    }
    .stat-item strong {
      color: #1e293b;
      font-size: 14px;
    }

    /* ── 메모 목록 ── */
    .memo-list {
      flex: 1;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .memo-list-empty {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 13px;
    }

    .memo-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      transition: background 0.1s;
    }
    .memo-item:hover { background: #f8fafc; }
    .memo-item:last-child { border-bottom: none; }

    .memo-item-body { flex: 1; min-width: 0; }

    .memo-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .memo-patent-num {
      font-weight: 700;
      font-size: 12px;
      color: #1e40af;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 4px;
    }
    .badge-category {
      background: #e0e7ff;
      color: #3730a3;
    }
    .badge-status-진행중 { background: #dbeafe; color: #1e40af; }
    .badge-status-완료   { background: #dcfce7; color: #166534; }
    .badge-status-보류   { background: #fef3c7; color: #92400e; }

    .memo-content {
      font-size: 13px;
      color: #334155;
      line-height: 1.5;
      word-break: break-word;
    }
    .memo-meta {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }

    /* ── 액션 버튼 ── */
    .memo-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .memo-item:hover .memo-actions { opacity: 1; }

    .btn-icon {
      width: 28px;
      height: 28px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s;
    }
    .btn-icon:hover { background: #f1f5f9; }
    .btn-icon.danger:hover { background: #fef2f2; border-color: #fca5a5; }

    /* ── 하단 바 ── */
    .bottom-bar {
      display: flex;
      justify-content: flex-end;
      padding-top: 12px;
      flex-shrink: 0;
    }

    /* ── 인라인 수정 모드 ── */
    .edit-mode .memo-content { display: none; }
    .edit-mode .memo-meta { display: none; }
    .edit-area { display: none; }
    .edit-mode .edit-area {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
    }
    .edit-area textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }
    .edit-area .edit-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .edit-area select {
      padding: 4px 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
    }
    .edit-area .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .edit-area .btn-sm.save { background: #2563eb; color: #fff; }
    .edit-area .btn-sm.cancel { background: #e5e7eb; color: #333; }
  </style>
</head>
<body>
  <!-- 검색/필터 -->
  <div class="filter-bar">
    <input type="text" class="search-input" id="searchInput"
      placeholder="출원번호, 메모 내용으로 검색...">
    <select class="filter-select" id="filterCategory">
      <option value="all">전체 카테고리</option>
    </select>
    <select class="filter-select" id="filterStatus">
      <option value="all">전체 상태</option>
    </select>
    <select class="filter-select" id="filterAuthor">
      <option value="all">전체 작성자</option>
    </select>
  </div>

  <!-- 통계 -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-item">전체 <strong id="statTotal">0</strong>건</div>
    <div class="stat-item">진행중 <strong id="statProgress">0</strong></div>
    <div class="stat-item">완료 <strong id="statDone">0</strong></div>
    <div class="stat-item">보류 <strong id="statHold">0</strong></div>
  </div>

  <!-- 메모 목록 -->
  <div class="memo-list" id="memoList">
    <div class="memo-list-empty">메모를 불러오는 중...</div>
  </div>

  <!-- 하단 -->
  <div class="bottom-bar">
    <button class="btn btn-cancel" id="btnClose">닫기</button>
  </div>

  <script src="js/config.js"></script>
  <script src="js/sheets-api.js"></script>
  <script src="js/memo-list.js"></script>
</body>
</html>
